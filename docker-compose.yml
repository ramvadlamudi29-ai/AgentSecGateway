services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENTSEC_TOKEN: ${AGENTSEC_TOKEN:-dev-agentsec-token}
      AGENTSEC_REPORTS_DIR: /app/data/reports
      AGENTSEC_SESSION_HOURS: ${AGENTSEC_SESSION_HOURS:-12}
    volumes:
      - audit-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  audit-data:
