name: Audit Request Automation

on:
  issues:
    types:
      - labeled

jobs:
  audit-request:
    if: github.event.label.name == 'audit-request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = `## AgentSec audit intake checklist\n\n- [ ] Confirm contact email\n- [ ] Confirm repo or system scope\n- [ ] Confirm package: Starter, Team, or Enterprise\n- [ ] Run AgentSec Gateway scan\n- [ ] Review prompt injection findings\n- [ ] Review MCP permissions\n- [ ] Review secret leakage\n- [ ] Prepare remediation plan\n- [ ] Send paid audit proposal\n\nIssue: #${issue.number}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
