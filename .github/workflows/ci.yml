name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m pip install -r requirements-server.txt
      - run: python -m unittest discover -s tests
      - run: python -m compileall agentsec_scan server tests
      - run: node --check site/app.js
      - run: node --check site/install-prompt.js
      - run: node --check site/sw.js
      - run: node --check site/dashboard.js
      - run: python -m json.tool site/manifest.webmanifest > /dev/null
      - run: python -c "import server.app"
